apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-deployment
  labels:
    name: notification-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification
  template:
    metadata:
      labels:
        app: notification
    spec:
      containers:
        - name: notification-server
          imagePullPolicy: IfNotPresent
          image: notification
          resources:
            limits:
              memory: "128Mi"
              cpu: "500m"
            requests:
              memory: "64Mi"
              cpu: "250m"
          env:
            - name: BREVO_API_KEY
              valueFrom:
                secretKeyRef:
                  name: auth-secret
                  key: BREVO_API_KEY
            - name: BREVO_SENDER_EMAIL
              valueFrom:
                secretKeyRef:
                  name: auth-secret
                  key: BREVO_SENDER_EMAIL
            - name: RABBITMQ_URL
              valueFrom:
                secretKeyRef:
                  name: auth-secret
                  key: RABBITMQ_URL
            - name: RABBITMQ_PORT
              valueFrom:
                secretKeyRef:
                  name: auth-secret
                  key: RABBITMQ_PORT
          livenessProbe:
            httpGet:
              path: /api/healthz
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
          readinessProbe:
            httpGet:
              path: /api/readyz
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
          ports:
            - containerPort: 4000
