apiVersion: v1
kind: ServiceAccount
metadata:
  name: resource-manager

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: resource-manager
rules:
  - apiGroups: [""]
    resources: ["pods", "services"]
    verbs: ["create", "delete", "get", "list", "patch", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: resource-manager-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: resource-manager
subjects:
  - kind: ServiceAccount
    name: resource-manager
    namespace: default